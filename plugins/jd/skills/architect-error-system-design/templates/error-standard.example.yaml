# error-standard.yaml — the project's canonical error contract.
# Generated by jd:architect-error-system-design. Read by jd:error-audit (conformance mode).
# This example shows the shape with a few representative codes. Replace with codes derived
# from discovery and the project's critical paths. Format: references/contract-spec.md.

version: 1

locales: [ko, vi, en]

categories:
  - operational
  - programmer

defaults:
  http_status: 500
  retryable: false
  severity: medium
  alert: false
  log_level: error

policy:
  operational:
    log_level: warn
    alert: false
    user_message: localized
  programmer:
    log_level: error
    alert: true
    user_message: generic

codes:
  VALIDATION:
    category: operational
    http_status: 400
    retryable: false
    severity: low
    log_level: info
    messages:
      ko: 입력값이 올바르지 않습니다.
      vi: Dữ liệu nhập không hợp lệ.
      en: The submitted data is invalid.

  AUTH_OTP_EXPIRED:
    category: operational
    http_status: 401
    retryable: true
    severity: medium
    log_level: warn
    messages:
      ko: 인증번호가 만료되었습니다. 다시 요청해 주세요.
      vi: Mã xác thực đã hết hạn. Vui lòng yêu cầu lại.
      en: The verification code has expired. Please request a new one.

  PERMISSION_DENIED:
    category: operational
    http_status: 403
    retryable: false
    severity: medium
    log_level: warn
    messages:
      ko: 권한이 없습니다.
      vi: Bạn không có quyền thực hiện thao tác này.
      en: You do not have permission to perform this action.

  NOT_FOUND:
    category: operational
    http_status: 404
    retryable: false
    severity: low
    log_level: info
    messages:
      ko: 요청한 항목을 찾을 수 없습니다.
      vi: Không tìm thấy mục yêu cầu.
      en: The requested item was not found.

  DOC_UPLOAD_TOO_LARGE:
    category: operational
    http_status: 413
    retryable: false
    severity: low
    log_level: info
    messages:
      ko: 파일 크기가 허용 범위를 초과했습니다.
      vi: Kích thước tệp vượt quá giới hạn cho phép.
      en: The file exceeds the allowed size.

  EXTERNAL_SERVICE_UNAVAILABLE:
    category: operational
    http_status: 503
    retryable: true
    severity: high
    log_level: error
    messages:
      ko: 일시적인 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.
      vi: Đã xảy ra lỗi tạm thời. Vui lòng thử lại sau.
      en: A temporary error occurred. Please try again shortly.

  INTERNAL:
    category: programmer
    http_status: 500
    retryable: false
    severity: critical
    alert: true
    log_level: error
    messages:
      ko: 시스템 오류가 발생했습니다.
      vi: Đã xảy ra lỗi hệ thống.
      en: A system error occurred.
